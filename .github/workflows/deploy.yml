name: 🚀 Deploy React App to cPanel (SFTP)

on:
  push:
    branches:
      - main  # Trigger deploys when you push to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your repository code
      - name: 🧾 Checkout Repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3️⃣ Install project dependencies
      - name: 📦 Install Dependencies
        run: |
          echo "Installing dependencies..."
          npm ci

      # 4️⃣ Build your React app
      - name: 🏗️ Build React App
        run: |
          echo "Building React app..."
          npm run build

      # 5️⃣ Copy .htaccess file if needed
      - name: 🗂️ Copy .htaccess
        run: |
          if [ -f public/.htaccess ]; then
            cp public/.htaccess dist/.htaccess
          fi
          ls -la dist/

      # 6️⃣ Create a deployment log
      - name: 🧾 Create Deployment Log
        run: |
          echo "✅ Deployment successful at $(date -u)" > dist/deployment.log
          echo "Commit: $GITHUB_SHA" >> dist/deployment.log
          echo "Branch: $GITHUB_REF_NAME" >> dist/deployment.log
          echo "Actor: $GITHUB_ACTOR" >> dist/deployment.log

      # 7️⃣ Deploy to cPanel using SFTP
      - name: 🚀 Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          password: ${{ secrets.CPANEL_PASSWORD }}
          port: 22
          local_path: dist/
          remote_path: ${{ secrets.CPANEL_PATH }}/
          sftp_only: true
