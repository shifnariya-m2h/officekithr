name: Deploy React App to cPanel

on:
  push:  
    branches:
      - main   # or your deploy branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # adjust if needed

      # Install dependencies
      - name: Install Dependencies
        run: npm install

      # Build React app (outputs to dist/)
      - name: Build Project
        run: npm run build

      # ✅ Copy .htaccess into dist/ if using Vite
      - name: Copy .htaccess
        run: cp public/.htaccess dist/.htaccess

      # Deploy dist/ folder to cPanel
      - name: Deploy to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          password: ${{ secrets.CPANEL_PASSWORD }}
          server-dir: ${{ secrets.CPANEL_PATH }}/
          local-dir: dist/
          dangerous-clean-slate: true   # clears old files first

